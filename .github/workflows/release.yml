name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14          # Apple Silicon
            target: aarch64-apple-darwin
          - runner: macos-13          # Intel
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: deploy-app/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: deploy-app/src-tauri

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain and import the .p12 cert so codesign
          # can find it. Tears down automatically when the runner exits.
          KEYCHAIN=build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security import cert.p12 \
            -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm cert.p12
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Install frontend dependencies
        working-directory: deploy-app
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and notarize
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: deploy-app
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles dmg
          tagName: ${{ github.ref_name }}
          releaseName: "Bishop ${{ github.ref_name }}"
          releaseBody: |
            Bishop ${{ github.ref_name }} — signed and notarized macOS builds.

            - **Apple Silicon**: `Bishop_*_aarch64.dmg`
            - **Intel**: `Bishop_*_x64.dmg`

            Download, double-click, drag into Applications. No Gatekeeper warnings.
          releaseDraft: true
          prerelease: false
